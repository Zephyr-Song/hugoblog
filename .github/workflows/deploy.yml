name: Deploy Hugo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Check environment
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== Hugo Version ==="
          hugo version
          echo "=== Directory Structure ==="
          ls -la
          echo "=== Content ==="
          find content -type f | head -20
          echo "=== Themes ==="
          ls -la themes/

      - name: Build
        run: |
          echo "Starting Hugo build..."
          hugo --minify -v 2>&1 | tee build.log
          echo "Build completed"
          echo "=== Build Output ==="
          cat build.log

      - name: Check build output
        run: |
          echo "=== Public Directory ==="
          ls -la public/ | head -20
          echo "=== File Count ==="
          find public -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
