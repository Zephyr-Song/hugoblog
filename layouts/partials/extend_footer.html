{{- /* 粒子动画脚本 */ -}}
{{- if .Site.Params.animations.enabled }}
  <script defer src="{{ "js/particles.js" | relURL }}"></script>
{{- end }}

{{- /* MetingJS 音乐播放器 */ -}}
{{- if .Site.Params.musicPlayer.enabled }}
  <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/meting@2/dist/Meting.min.js"></script>
  <meting-js
    server="netease"
    type="playlist"
    id="2809513713"
    fixed="true"
    autoplay="false"
    theme="#8fb3a9"
    order="list"
    loop="all"
    volume="0.7"
    mini="true"
    mutex="true"
    list-folded="false"
    list-max-height="250px">
  </meting-js>
{{- end }}
