baseURL = 'https://zephyrsong.qzz.io/'
languageCode = 'en-us'
title = 'My Blog'
theme = 'PaperMod'

defaultContentLanguage = "en"
hasCJKLanguage = true

[languages]
  [languages.en]
    title = "My Blog"
    languageName = "English"
    weight = 1
    
    [languages.en.params]
      languageAltTitle = "English"

  [languages.zh]
    title = "我的博客"
    languageName = "中文"
    weight = 2
    
    [languages.zh.params]
      languageAltTitle = "Chinese"

# 启用资源处理
[build]
  writeStats = true

[params]
  # 启用 Home Info 模式 —— socialIcons 只在这个模式下显示
  [params.homeInfoParams]
    Title = "Hi, I'm Zephyr 👋"
    Content = """生于湖北荆州，六岁迁居湖南长沙，在青园小学、南雅初中、雅礼高中的时光里积淀成长，现就读于苏州西交利物浦大学，喜欢随处逛逛，探索世界。

闲暇时偏爱在围棋象棋的对弈中思悟，通过运动健身来感受心脏真实跳动，也常沉浸在小说漫画和游戏的世界里，让音乐伴日常，同时积极探索科技。"""

  # GitHub 图标（必须配合 homeInfoParams 或 profileMode 才显示）
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Zephyr-Song"

  [[params.socialIcons]]
    name = "link"
    url = "https://zephyr-song.github.io"

  # 动态效果和音乐播放器配置
  [params.animations]
    enabled = true
    particleCount = 25
    enableMouseTracking = true

  # 漫画鼠标特效
  [params.comicEffects]
    enabled = true
    mouseFlow = true
    comicBubbles = true

  [params.musicPlayer]
    enabled = true
    autoplay = false

  disableLangToggle = false

