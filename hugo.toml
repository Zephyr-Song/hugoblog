baseURL = 'https://zephyrsong.qzz.io/'
languageCode = 'en-us'
title = 'My Blog'
theme = 'PaperMod'

# 启用资源处理
[build]
  writeStats = true

[params]
  # 启用 Home Info 模式 —— socialIcons 只在这个模式下显示
  [params.homeInfoParams]
    Title = "Hi, I'm Zephyr 👋"
    Content = """出生于湖北荆州沙市，六岁迁居湖南长沙，在青园小学、南雅初中、雅礼高中的时光里积淀成长，现就读于西交利物浦大学，喜欢四处逛逛，探索世界。

闲暇时偏爱在围棋象棋的对弈中思悟，于街健、运动感受心脏真实跳动，也常沉浸在小说、漫画的世界里，让音乐伴日常，会打游戏，同时积极探索科技。"""

  # GitHub 图标（必须配合 homeInfoParams 或 profileMode 才显示）
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Zephyr-Song"

  # 动态效果和音乐播放器配置
  [params.animations]
    enabled = true
    particleCount = 25
    enableMouseTracking = true

  [params.musicPlayer]
    enabled = true
    autoplay = false
